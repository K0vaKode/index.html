<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevRunners Mobile Mechanics - Invoice Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #1a1a1a;
            color: white;
            padding: 40px 30px;
            text-align: center;
            border-bottom: 4px solid #39ff14;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #39ff14;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
        }

        .header p {
            color: #ccc;
            font-size: 1.1rem;
        }

        .form-section {
            padding: 30px;
        }

        .section-title {
            font-size: 1.1rem;
            color: #1a1a1a;
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #39ff14;
            border-radius: 2px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input, textarea, select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #39ff14;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(57, 255, 20, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .items-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 4px solid #39ff14;
        }

        .item-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 12px;
            margin-bottom: 15px;
            align-items: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #1a1a1a;
            color: #39ff14;
            border: 2px solid #39ff14;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(57, 255, 20, 0.4);
            background: #39ff14;
            color: #1a1a1a;
        }

        .btn-danger {
            background: #ff4757;
            color: white;
            padding: 10px 15px;
        }

        .btn-danger:hover {
            background: #ff3838;
        }

        .btn-success {
            background: #39ff14;
            color: #1a1a1a;
            border: 2px solid #39ff14;
            font-weight: 700;
        }

        .btn-success:hover {
            background: #32e012;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(57, 255, 20, 0.4);
        }

        .add-item-btn {
            width: 100%;
            margin-top: 10px;
        }

        .totals-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            justify-content: flex-end;
            border-left: 4px solid #39ff14;
        }

        .totals-box {
            width: 300px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .total-row.final {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1a1a;
            border-bottom: none;
            border-top: 2px solid #39ff14;
            margin-top: 10px;
            padding-top: 15px;
        }

        .actions {
            padding: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .invoice-preview {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
        }

        .preview-content {
            background: white;
            max-width: 800px;
            margin: 50px auto;
            padding: 50px;
            border-radius: 10px;
            position: relative;
        }

        .close-preview {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #666;
        }

        .close-preview:hover {
            color: #1a1a1a;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            border-bottom: 3px solid #39ff14;
            padding-bottom: 30px;
            align-items: center;
        }

        .preview-company h2 {
            color: #1a1a1a;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .preview-company p {
            color: #666;
            font-size: 0.9rem;
        }

        .preview-invoice-info {
            text-align: right;
        }

        .preview-invoice-info h3 {
            color: #39ff14;
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }

        .preview-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .preview-table th {
            background: #1a1a1a;
            color: #39ff14;
            padding: 15px;
            text-align: left;
            text-transform: uppercase;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .preview-table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .preview-table tr:nth-child(even) {
            background: #f8f9fa;
        }

        .preview-totals {
            float: right;
            width: 300px;
        }

        .print-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 30px;
            font-size: 1.1rem;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 2rem;
                letter-spacing: 2px;
            }

            .form-section {
                padding: 20px;
            }

            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }

            .item-row {
                grid-template-columns: 1fr;
                background: white;
                padding: 15px;
                border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            }

            .item-row input {
                margin-bottom: 10px;
            }

            .totals-box {
                width: 100%;
            }

            .actions {
                padding: 20px;
            }

            .btn {
                width: 100%;
            }

            .preview-content {
                margin: 20px;
                padding: 25px;
            }

            .preview-header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .preview-invoice-info {
                text-align: center;
            }

            .preview-invoice-info h3 {
                font-size: 1.5rem;
            }

            .preview-details {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .preview-table {
                font-size: 0.9rem;
            }

            .preview-table th, .preview-table td {
                padding: 10px;
            }

            .print-btn {
                position: relative;
                bottom: auto;
                right: auto;
                margin: 20px auto;
                display: block;
            }
        }

        .currency-input {
            position: relative;
        }

        .currency-input::before {
            content: '£';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-weight: 600;
        }

        .currency-input input {
            padding-left: 30px;
        }

        .date-input {
            color: #333;
        }

        /* Animation for buttons */
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>INVOICE</h1>
            <p>RevRunners Mobile Mechanics</p>
        </div>

        <div class="form-section">
            <!-- Company & Client Info -->
            <div class="grid-2">
                <div>
                    <div class="section-title">Your Business</div>
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="companyName" value="RevRunners Mobile Mechanics" placeholder="Your Company Name">
                    </div>
                    <div class="form-group">
                        <label>Your Email</label>
                        <input type="email" id="companyEmail" placeholder="email@revrunners.co.uk">
                    </div>
                    <div class="form-group">
                        <label>Your Phone</label>
                        <input type="tel" id="companyPhone" placeholder="07700 900000">
                    </div>
                </div>
                <div>
                    <div class="section-title">Bill To</div>
                    <div class="form-group">
                        <label>Client Name</label>
                        <input type="text" id="clientName" placeholder="Client Name">
                    </div>
                    <div class="form-group">
                        <label>Client Email</label>
                        <input type="email" id="clientEmail" placeholder="client@email.com">
                    </div>
                    <div class="form-group">
                        <label>Invoice Date</label>
                        <input type="date" id="invoiceDate" class="date-input">
                    </div>
                </div>
            </div>

            <!-- Invoice Items -->
            <div class="items-section">
                <div class="section-title">Invoice Items</div>
                <div id="itemsContainer">
                    <!-- Items will be added here dynamically -->
                </div>
                <button class="btn btn-primary add-item-btn" onclick="addItem()">
                    + Add Item
                </button>
            </div>

            <!-- Totals -->
            <div class="totals-section">
                <div class="totals-box">
                    <div class="total-row final">
                        <span>Total:</span>
                        <span id="total">£0.00</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-success pulse" onclick="generateInvoice()">
                📄 Generate Invoice
            </button>
            <button class="btn btn-primary" onclick="saveTemplate()">
                💾 Save Template
            </button>
            <button class="btn btn-primary" onclick="loadTemplate()">
                📂 Load Template
            </button>
            <button class="btn btn-danger" onclick="clearAll()">
                🗑️ Clear All
            </button>
        </div>
    </div>

    <!-- Invoice Preview Modal -->
    <div id="previewModal" class="invoice-preview">
        <div class="preview-content" id="invoiceContent">
            <span class="close-preview" onclick="closePreview()">&times;</span>
            <div id="previewBody">
                <!-- Preview content generated here -->
            </div>
        </div>
        <button class="btn btn-success print-btn" onclick="printInvoice()">
            🖨️ Print / Save PDF
        </button>
    </div>

    <script>
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('invoiceDate').valueAsDate = new Date();
            addItem(); // Add first item row
        });

        let itemCount = 0;

        function addItem() {
            itemCount++;
            const container = document.getElementById('itemsContainer');
            const itemRow = document.createElement('div');
            itemRow.className = 'item-row';
            itemRow.id = `item-${itemCount}`;
            
            itemRow.innerHTML = `
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" placeholder="Item description" class="item-desc">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" value="1" min="1" class="item-qty" onchange="calculateTotals()">
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <div class="currency-input">
                        <input type="number" placeholder="0.00" min="0" step="0.01" class="item-price" onchange="calculateTotals()">
                    </div>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="text" readonly class="item-amount" value="£0.00" style="background: #f0f0f0;">
                </div>
                <button class="btn btn-danger" onclick="removeItem(${itemCount})" style="height: 42px;">
                    ✕
                </button>
            `;
            
            container.appendChild(itemRow);
        }

        function removeItem(id) {
            const item = document.getElementById(`item-${id}`);
            if (document.querySelectorAll('.item-row').length > 1) {
                item.remove();
                calculateTotals();
            } else {
                alert('You must have at least one item!');
            }
        }

        function calculateTotals() {
            let subtotal = 0;
            const rows = document.querySelectorAll('.item-row');
            
            rows.forEach(row => {
                const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
                const price = parseFloat(row.querySelector('.item-price').value) || 0;
                const amount = qty * price;
                subtotal += amount;
                row.querySelector('.item-amount').value = '£' + amount.toFixed(2);
            });

            document.getElementById('total').textContent = '£' + subtotal.toFixed(2);
        }

        function generateInvoice() {
            const companyName = document.getElementById('companyName').value || 'RevRunners Mobile Mechanics';
            const companyEmail = document.getElementById('companyEmail').value || '';
            const companyPhone = document.getElementById('companyPhone').value || '';
            const clientName = document.getElementById('clientName').value || 'Client';
            const clientEmail = document.getElementById('clientEmail').value || '';
            const date = document.getElementById('invoiceDate').value;
            const invoiceNumber = 'INV-' + Date.now().toString().slice(-6);

            let itemsHtml = '';
            let subtotal = 0;

            document.querySelectorAll('.item-row').forEach(row => {
                const desc = row.querySelector('.item-desc').value || 'Item';
                const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
                const price = parseFloat(row.querySelector('.item-price').value) || 0;
                const amount = qty * price;
                subtotal += amount;

                itemsHtml += `
                    <tr>
                        <td>${desc}</td>
                        <td>${qty}</td>
                        <td>£${price.toFixed(2)}</td>
                        <td>£${amount.toFixed(2)}</td>
                    </tr>
                `;
            });

            const previewHtml = `
                <div class="preview-header">
                    <div class="preview-company">
                        <h2>${companyName}</h2>
                        <p>${companyEmail}<br>${companyPhone}</p>
                    </div>
                    <div class="preview-invoice-info">
                        <h3>INVOICE</h3>
                        <p><strong>#${invoiceNumber}</strong><br>
                        Date: ${date}</p>
                    </div>
                </div>

                <div class="preview-details">
                    <div>
                        <h4 style="color: #1a1a1a; margin-bottom: 10px; text-transform: uppercase; font-size: 0.9rem;">From:</h4>
                        <p><strong>${companyName}</strong><br>
                        ${companyEmail}<br>
                        ${companyPhone}</p>
                    </div>
                    <div>
                        <h4 style="color: #1a1a1a; margin-bottom: 10px; text-transform: uppercase; font-size: 0.9rem;">Bill To:</h4>
                        <p><strong>${clientName}</strong><br>${clientEmail}</p>
                    </div>
                </div>

                <table class="preview-table">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Quantity</th>
                            <th>Unit Price</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itemsHtml}
                    </tbody>
                </table>

                <div class="preview-totals">
                    <div class="total-row final" style="font-size: 1.4rem; color: #1a1a1a; border-top: 3px solid #39ff14; padding-top: 15px;">
                        <span>Total:</span>
                        <span>£${subtotal.toFixed(2)}</span>
                    </div>
                </div>

                <div style="clear: both; margin-top: 50px; padding-top: 30px; border-top: 2px solid #e0e0e0; text-align: center; color: #666;">
                    <p style="color: #39ff14; font-weight: 600; margin-bottom: 5px;">Thank you for choosing RevRunners Mobile Mechanics!</p>
                    <p style="font-size: 0.9rem;">We come to you - Professional automotive services at your location</p>
                </div>
            `;

            document.getElementById('previewBody').innerHTML = previewHtml;
            document.getElementById('previewModal').style.display = 'block';
        }

        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
        }

        function printInvoice() {
            window.print();
        }

        function saveTemplate() {
            const data = {
                companyName: document.getElementById('companyName').value,
                companyEmail: document.getElementById('companyEmail').value,
                companyPhone: document.getElementById('companyPhone').value
            };
            localStorage.setItem('revrunnersTemplate', JSON.stringify(data));
            alert('Template saved successfully!');
        }

        function loadTemplate() {
            const saved = localStorage.getItem('revrunnersTemplate');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('companyName').value = data.companyName || 'RevRunners Mobile Mechanics';
                document.getElementById('companyEmail').value = data.companyEmail || '';
                document.getElementById('companyPhone').value = data.companyPhone || '';
                alert('Template loaded!');
            } else {
                alert('No saved template found.');
            }
        }

        function clearAll() {
            if (confirm('Are you sure you want to clear all data?')) {
                document.getElementById('companyEmail').value = '';
                document.getElementById('companyPhone').value = '';
                document.getElementById('clientName').value = '';
                document.getElementById('clientEmail').value = '';
                
                document.getElementById('itemsContainer').innerHTML = '';
                itemCount = 0;
                addItem();
                calculateTotals();
            }
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('previewModal');
            if (event.target === modal) {
                closePreview();
            }
        }
    </script>
</body>
</html>
